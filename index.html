<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Lotto</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0b132b, #020617);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: #1c2541;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.button {
    background: #00c853;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
    border: none;
    color: white;
    font-size: 16px;
}

.wallet {
    margin-top: 10px;
    font-size: 14px;
}
</style>

</head>
<body>

<div class="container">

<h1>💎 TON Lotto</h1>

<div class="card">
    <button id="connectBtn" class="button">Connect Wallet</button>
    <p id="walletAddress" class="wallet">Wallet: Not Connected</p>
</div>

<div class="card">
    <p>Players: <span id="players">0/20</span></p>
    <p>Prize Pool: <span id="prize">0 TON</span></p>
    <p>⏳ Time: <span id="timer">15s</span></p>

    <button class="button" onclick="joinRoom()">Enter Room</button>
</div>

</div>

<script>
// =======================
// TON CONNECT
// =======================
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://luckypoint-dev.github.io/lucky-point/tonconnect-manifest.json'
});

document.getElementById("connectBtn").onclick = () => {
    tonConnectUI.openModal();
};

tonConnectUI.onStatusChange(wallet => {
    if (wallet) {
        document.getElementById("walletAddress").innerText =
            "Wallet: " + wallet.account.address.slice(0,6) + "...CONNECTED";
    }
});

// =======================
// GAME LOGIC
// =======================
let players = 0;
let maxPlayers = 20;
let entry = 0.01; // safer test
let countdown = 15;

// update UI
function updateUI() {
    document.getElementById("players").innerText = players + "/" + maxPlayers;
    document.getElementById("prize").innerText = (players * entry).toFixed(2) + " TON";
    document.getElementById("timer").innerText = countdown + "s";
}

// =======================
// PAYMENT + JOIN
// =======================
async function joinRoom() {

    if (!tonConnectUI.connected) {
        alert("⚠️ Connect wallet first!");
        return;
    }

    const tx = {
        validUntil: Math.floor(Date.now() / 1000) + 300,
        messages: [
            {
                address: "UQDAp6lKZOelCx8a4LOV9mqCRlpeCWIxMDzIbcUKEkLO5u9L", // 🔥 CHANGE THIS
                amount: "10000000" // 0.01 TON (test first)
            }
        ]
    };

    try {
        await tonConnectUI.sendTransaction(tx);

        players++;
        updateUI();

        alert("✅ Payment successful! You joined the room.");

    } catch (e) {
        alert("❌ Transaction cancelled");
    }
}

// =======================
// AUTO PLAYERS (DEMO)
// =======================
setInterval(() => {
    if (players < maxPlayers) {
        if (Math.random() > 0.5) {
            players++;
            updateUI();
        }
    }
}, 2000);

// =======================
// COUNTDOWN
// =======================
setInterval(() => {
    if (countdown > 0) {
        countdown--;
    } else {
        pickWinner();
        countdown = 15;
        players = Math.floor(Math.random() * 5);
    }
    updateUI();
}, 1000);

// =======================
// WINNER
// =======================
function pickWinner() {
    if (players === 0) return;

    let prize = players * entry;
    let winner = Math.floor(Math.random() * players) + 1;

    alert("🎉 Winner: Player #" + winner + " wins " + prize.toFixed(2) + " TON!");
}

updateUI();

</script>

</body>
</html>
