<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Jackpot</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b132b;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #1c2541;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    width: 300px;
}

h1 {
    margin-bottom: 10px;
}

h2 {
    margin-bottom: 20px;
}

button {
    background: #28a745;
    border: none;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 18px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #218838;
}
</style>
</head>

<body>

<div class="card">
    <h1>🎰 TON Jackpot</h1>
    <h2 id="balance">Balance: 10 TON</h2>
    <button onclick="playGame()">Play</button>
</div>

<script>
let balance = 10;

function playGame() {
    let result = Math.random();

    if (result > 0.7) {
        // Win
        let winAmount = Math.floor(Math.random() * 5) + 1;
        balance += winAmount;
        alert("🎉 You win " + winAmount + " TON!");
    } else {
        // Lose
        let loseAmount = Math.floor(Math.random() * 3) + 1;
        balance -= loseAmount;
        alert("😢 You lose " + loseAmount + " TON!");
    }

    if (balance < 0) balance = 0;

    document.getElementById("balance").innerText = "Balance: " + balance + " TON";
}
</script>

</body>
</html>
