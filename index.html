<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Lotto</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #0f2027, #0b132b);
  color: white;
}

.container {
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.wallet-btn {
  background: linear-gradient(90deg, #00f2fe, #4facfe);
  padding: 10px 15px;
  border-radius: 12px;
  border: none;
  color: white;
}

.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.stat-box {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  width: 30%;
  text-align: center;
}

.room {
  background: rgba(255,255,255,0.05);
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

.enter-btn {
  background: linear-gradient(90deg, #00c853, #00e676);
  padding: 12px;
  border-radius: 12px;
  border: none;
  width: 100%;
  margin-top: 10px;
  color: white;
  font-weight: bold;
}

.countdown {
  margin-top: 10px;
  font-size: 18px;
  color: #00e676;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>💎 TON Lotto</h2>
    <button class="wallet-btn">Connect Wallet</button>
  </div>

  <h1>Win TON Prizes</h1>
  <p>Join room, wait countdown, win randomly!</p>

  <div class="stats">
    <div class="stat-box">
      <p>Total Draws</p>
      <h3 id="draws">0</h3>
    </div>

    <div class="stat-box">
      <p>TON Distributed</p>
      <h3 id="ton">0</h3>
    </div>

    <div class="stat-box">
      <p>Players</p>
      <h3 id="players">0</h3>
    </div>
  </div>

  <h3>⚡ Choose Room</h3>

  <div class="room">
    <p>Entry: 0.1 TON</p>
    <h2>Prize Pool: <span id="pool">0</span> TON</h2>
    <p>Players: <span id="count">0</span>/20</p>

    <div class="countdown" id="countdown"></div>

    <button class="enter-btn" onclick="enterRoom()">Enter Room</button>
  </div>

</div>

<script>
let players = 0;
let pool = 0;
let draws = 0;
let totalTon = 0;
let countdownActive = false;

function enterRoom() {
  if (players < 20 && !countdownActive) {
    players++;
    pool += 0.1;

    updateUI();

    if (players === 20) {
      startCountdown();
    }
  }
}

function updateUI() {
  document.getElementById("count").innerText = players;
  document.getElementById("pool").innerText = pool.toFixed(2);
  document.getElementById("players").innerText = players;
}

function startCountdown() {
  countdownActive = true;
  let time = 5;

  let interval = setInterval(() => {
    document.getElementById("countdown").innerText =
      "⏳ Drawing in " + time + "s";

    time--;

    if (time < 0) {
      clearInterval(interval);
      pickWinner();
    }
  }, 1000);
}

function pickWinner() {
  draws++;
  totalTon += pool;

  document.getElementById("draws").innerText = draws;
  document.getElementById("ton").innerText = totalTon.toFixed(2);

  let winner = Math.floor(Math.random() * players);

  alert("🎉 Winner is Player #" + (winner + 1));

  // reset
  players = 0;
  pool = 0;
  countdownActive = false;

  document.getElementById("countdown").innerText = "";
  updateUI();
}
</script>

</body>
</html>
