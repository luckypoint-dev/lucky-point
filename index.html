<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Lotto</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0b132b, #020617);
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

.button {
    background: #00c853;
    padding: 15px;
    border-radius: 10px;
    margin-top: 15px;
    cursor: pointer;
}

.wallet {
    background: #1c2541;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
}
</style>

</head>
<body>

<div class="container">

<h1>💎 TON Lotto</h1>

<div class="wallet">
    <div id="connectBtn"></div>
    <p id="walletAddress">Wallet: Not Connected</p>
</div>

<p>Players: <span id="players">0/20</span></p>
<p>Prize Pool: <span id="prize">0 TON</span></p>
<p>Time: <span id="timer">15s</span></p>

<div class="button" onclick="joinRoom()">Enter Room</div>

</div>

<script>
// TON Connect
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://luckypoint-dev.github.io/lucky-point/tonconnect-manifest.json',
    buttonRootId: 'connectBtn'
});

// wallet address display
tonConnectUI.onStatusChange(wallet => {
    if (wallet) {
        document.getElementById("walletAddress").innerText =
            "Wallet: " + wallet.account.address.slice(0, 6) + "...";
    }
});

// Game Logic
let players = 0;
let maxPlayers = 20;
let entry = 0.1;
let countdown = 15;

function updateUI() {
    document.getElementById("players").innerText = players + "/" + maxPlayers;
    document.getElementById("prize").innerText = (players * entry).toFixed(2) + " TON";
    document.getElementById("timer").innerText = countdown + "s";
}

function joinRoom() {
    if (players < maxPlayers) {
        players++;
        updateUI();
    } else {
        alert("Room Full!");
    }
}

// auto players
setInterval(() => {
    if (players < maxPlayers) {
        players += Math.random() > 0.6 ? 1 : 0;
        updateUI();
    }
}, 2000);

// countdown
setInterval(() => {
    if (countdown > 0) {
        countdown--;
    } else {
        pickWinner();
        countdown = 15;
        players = Math.floor(Math.random() * 5);
    }
    updateUI();
}, 1000);

function pickWinner() {
    if (players == 0) return;

    let prize = players * entry;
    let winner = Math.floor(Math.random() * players) + 1;

    alert("🎉 Player " + winner + " wins " + prize.toFixed(2) + " TON!");
}

updateUI();
</script>

</body>
</html>
